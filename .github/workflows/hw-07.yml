name: hw-07

on:
  push:
  pull_request:

env:
  COMPOSE_PROJECT_NAME: hw07_ci

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hw-07
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  unit_tests:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: hw-07
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build booking-service flight-service
      - run: docker compose run --rm --no-deps booking-service pytest -q tests/unit
      - run: docker compose run --rm --no-deps flight-service pytest -q tests/unit

  integration_tests:
    runs-on: ubuntu-latest
    needs: unit_tests
    defaults:
      run:
        working-directory: hw-07
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p artifacts
      - run: docker compose up -d --build --wait
      - run: docker compose --profile tests run --rm test-runner pytest -q tests/integration
      - name: Collect logs
        if: always()
        run: |
          docker compose logs --no-color > artifacts/integration-compose.log || true
          docker compose --profile tests down -v --remove-orphans || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-artifacts
          path: hw-07/artifacts/

  e2e_tests:
    runs-on: ubuntu-latest
    needs: integration_tests
    defaults:
      run:
        working-directory: hw-07
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p artifacts
      - run: docker compose up -d --build --wait
      - run: docker compose --profile tests run --rm test-runner pytest -q tests/e2e
      - name: Collect logs
        if: always()
        run: |
          docker compose logs --no-color > artifacts/e2e-compose.log || true
          docker compose --profile tests down -v --remove-orphans || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: hw-07/artifacts/

  load_metrics_and_alerts:
    runs-on: ubuntu-latest
    needs: e2e_tests
    defaults:
      run:
        working-directory: hw-07
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p artifacts
      - run: docker compose up -d --build --wait
      - run: docker compose --profile tests run --rm test-runner pytest -q tests/e2e
      - run: docker compose --profile tests run --rm load-test
      - run: docker compose --profile tests run --rm test-runner python scripts/verify_sli.py
      - run: docker compose --profile tests run --rm test-runner python scripts/verify_alert.py
      - name: Collect logs
        if: always()
        run: |
          docker compose logs --no-color > artifacts/load-compose.log || true
          docker compose --profile tests down -v --remove-orphans || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-artifacts
          path: hw-07/artifacts/
