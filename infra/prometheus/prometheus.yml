global:
  scrape_interval: 2s
  evaluation_interval: 2s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: booking-service
    static_configs:
      - targets: ["booking-service:8080"]

  - job_name: flight-service
    static_configs:
      - targets: ["flight-service:8081"]

  - job_name: booking-postgres
    static_configs:
      - targets: ["booking-postgres-exporter:9187"]

  - job_name: flight-postgres
    static_configs:
      - targets: ["flight-postgres-exporter:9187"]
