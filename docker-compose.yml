services:
  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 3s
      timeout: 3s
      retries: 20

  flight-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - flight_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate-booking:
    image: flyway/flyway:10-alpine
    depends_on:
      booking-db:
        condition: service_healthy
    command:
      - "-url=jdbc:postgresql://booking-db:5432/booking"
      - "-user=postgres"
      - "-password=postgres"
      - "-connectRetries=30"
      - "-locations=filesystem:/migrations"
      - "migrate"
    volumes:
      - ./booking-service/migrations:/migrations:ro

  migrate-flight:
    image: flyway/flyway:10-alpine
    depends_on:
      flight-db:
        condition: service_healthy
    command:
      - "-url=jdbc:postgresql://flight-db:5432/flight"
      - "-user=postgres"
      - "-password=postgres"
      - "-connectRetries=30"
      - "-locations=filesystem:/migrations"
      - "migrate"
    volumes:
      - ./flight-service/migrations:/migrations:ro

  flight-service:
    build:
      context: .
      dockerfile: flight-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@flight-db:5432/flight
      GRPC_BIND: 0.0.0.0:50051
      METRICS_PORT: 8081
    depends_on:
      migrate-flight:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health').read()"]
      interval: 3s
      timeout: 3s
      retries: 20

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@booking-db:5432/booking
      FLIGHT_GRPC_TARGET: flight-service:50051
    depends_on:
      migrate-booking:
        condition: service_completed_successfully
      flight-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 3s
      timeout: 3s
      retries: 20

  booking-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@booking-db:5432/booking?sslmode=disable
    depends_on:
      booking-db:
        condition: service_healthy

  flight-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@flight-db:5432/flight?sslmode=disable
    depends_on:
      flight-db:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      booking-service:
        condition: service_healthy
      flight-service:
        condition: service_healthy
      alertmanager:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"

  test-runner:
    profiles: ["tests"]
    build:
      context: .
      dockerfile: tests/Dockerfile
    environment:
      PYTHONPATH: /workspace
      API_URL: http://booking-service:8080
      BOOKING_DATABASE_URL: postgresql://postgres:postgres@booking-db:5432/booking
      FLIGHT_DATABASE_URL: postgresql://postgres:postgres@flight-db:5432/flight
      PROMETHEUS_URL: http://prometheus:9090
      ALERTMANAGER_URL: http://alertmanager:9093
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      booking-service:
        condition: service_healthy
      prometheus:
        condition: service_started

  load-test:
    profiles: ["tests"]
    build:
      context: .
      dockerfile: load/Dockerfile
    environment:
      TARGET_HOST: http://booking-service:8080
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      booking-service:
        condition: service_healthy

volumes:
  booking_db_data:
  flight_db_data:
